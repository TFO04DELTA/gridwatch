name: gridwatch-poll
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
concurrency:
  group: gridwatch
  cancel-in-progress: false
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Poll outages and emit JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python gridwatch.py poll --emit docs/data --no-db
      - name: Commit snapshot
        run: |
          git config user.name "gridwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "poll $(date -u +%FT%TZ)"
          git pull --rebase origin main || true
          git push
